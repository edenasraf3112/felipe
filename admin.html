<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felipe Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:Arial;background:#111;color:white;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;direction:rtl;">
  <div>
    <h1>פאנל ניהול Felipe</h1>
    <h2 id="status">טוען...</h2>

    <button onclick="setStoreMode('auto')" style="padding:14px 24px;margin:8px;font-size:18px;">
      אוטומטי לפי שעות 🕒
    </button>

    <button onclick="setStoreMode('open')" style="padding:14px 24px;margin:8px;font-size:18px;">
      פתח עכשיו ✅
    </button>

    <button onclick="setStoreMode('closed')" style="padding:14px 24px;margin:8px;font-size:18px;">
      סגור עכשיו ❌
    </button>

    <p id="debug" style="margin-top:20px;color:#aaa;font-size:14px;"></p>
  </div>

  <script>
    const SUPABASE_URL = "https://wuodinqnwqxhgbqninlp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_XgeozA-8AJ7eCvghHSaV0g_l0IRje2Q";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const statusEl = document.getElementById("status");
    const debugEl = document.getElementById("debug");

    function modeText(mode) {
      if (mode === "open") return "פתוח עכשיו בכוח ✅";
      if (mode === "closed") return "סגור עכשיו בכוח ❌";
      return "אוטומטי לפי שעות 🕒";
    }

    async function loadStatus() {
      statusEl.textContent = "בודק מצב חנות...";
      debugEl.textContent = "";

      const { data, error } = await supabaseClient
        .from("site_settings")
        .select("id, mode, closed_message, updated_at")
        .eq("id", "main")
        .single();

      console.log("ADMIN LOAD:", data, error);

      if (error) {
        statusEl.textContent = "שגיאה בטעינה ❌";
        debugEl.textContent = error.message;
        return;
      }

      if (!data) {
        statusEl.textContent = "לא נמצאה שורה main ❌";
        debugEl.textContent = "צריך ליצור שורה בטבלה site_settings";
        return;
      }

      statusEl.textContent = modeText(data.mode);

      debugEl.textContent =
        "מצב נוכחי: " + (data.mode || "auto") +
        " | עודכן לאחרונה: " + (data.updated_at || "אין נתון");
    }

    async function setStoreMode(mode) {
      statusEl.textContent = "מעדכן מצב...";
      debugEl.textContent = "";

      const { data, error } = await supabaseClient
        .from("site_settings")
        .upsert({
          id: "main",
          mode: mode,
          closed_message: "אנחנו סגורים כרגע, נחזור בקרוב 🌯",
          updated_at: new Date().toISOString()
        })
        .select("id, mode, closed_message, updated_at")
        .single();

      console.log("ADMIN MODE UPDATE:", data, error);

      if (error) {
        statusEl.textContent = "שגיאה בעדכון ❌";
        debugEl.textContent = error.message;
        alert("שגיאה בעדכון: " + error.message);
        return;
      }

      statusEl.textContent = modeText(data.mode);

      debugEl.textContent =
        "מצב נוכחי: " + data.mode +
        " | עודכן לאחרונה: " + (data.updated_at || "אין נתון");

      alert("עודכן: " + modeText(data.mode));
    }

    loadStatus();
  </script>
</body>
</html>
